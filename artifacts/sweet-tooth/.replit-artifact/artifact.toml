kind = "web"
previewPath = "/"
title = "Sweet Tooth"
version = "1.0.0"
id = "artifacts/sweet-tooth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20458

[services.development]
run = "pnpm --filter @workspace/sweet-tooth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sweet-tooth", "run", "build" ]
publicDir = "artifacts/sweet-tooth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20458"
BASE_PATH = "/"
